# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.ipynb$  # notebooks are JSON — don't corrupt them
      - id: end-of-file-fixer
        exclude: \.ipynb$  # notebooks are JSON — don't corrupt them
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-notebook-outputs
        name: Check notebook outputs are cleared
        entry: python -c "
import sys, json;
exit_code = 0;
for path in sys.argv[1:]:
    with open(path) as f: nb = json.load(f);
    for i, cell in enumerate(nb.get('cells', [])):
        if cell.get('outputs'):
            print(f'{path}: cell {i} has outputs. Clear all notebook outputs before committing.');
            exit_code = 1;
sys.exit(exit_code)
"
        language: python
        files: \.ipynb$
        pass_filenames: true
